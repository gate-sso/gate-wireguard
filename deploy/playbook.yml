---
- name: Deploy Gate-WireGuard
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    app_user: gate
    app_dir: /home/gate/gate-wireguard
    backup_dir: /home/gate/backups
    backup_keep: 5
    ruby_version: "4.0.1"
    node_major_version: "20"
    wg_conf_group: wg_conf
    puma_port: 3000
    wg_port: 51820

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: reload caddy
      systemd:
        name: caddy
        state: reloaded

    - name: restart wireguard-watcher
      systemd:
        name: wireguard-watcher
        state: restarted

  tasks:
    # =========================================================================
    # System packages and base setup
    # =========================================================================
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: [system]

    - name: Install system packages
      apt:
        name:
          - build-essential
          - git
          - curl
          - libssl-dev
          - libreadline-dev
          - zlib1g-dev
          - libyaml-dev
          - libxml2-dev
          - libxslt1-dev
          - libcurl4-openssl-dev
          - libffi-dev
          - libmysqlclient-dev
          - libvips
          - redis-server
          - ufw
          - inotify-tools
          - logrotate
          - acl
        state: present
      tags: [system]

    - name: Create wg_conf group
      group:
        name: "{{ wg_conf_group }}"
        state: present
      tags: [system]

    - name: Create app user
      user:
        name: "{{ app_user }}"
        shell: /bin/bash
        groups: "{{ wg_conf_group }}"
        append: yes
        create_home: yes
      tags: [system]

    - name: Add user to sudoers without password
      become: true
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        line: "{{ app_user }} ALL=(ALL) NOPASSWD: ALL"
        state: present
        validate: "visudo -cf %s"

    - name: Enable IPv4 forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: yes
        state: present
        reload: yes
      tags: [system]

    # =========================================================================
    # Ruby (rbenv)
    # =========================================================================
    - name: Check if rbenv is installed
      stat:
        path: /home/{{ app_user }}/.rbenv
      register: rbenv_dir
      tags: [ruby]

    - name: Install rbenv
      become_user: "{{ app_user }}"
      shell: curl -fsSL https://github.com/rbenv/rbenv-installer/raw/HEAD/bin/rbenv-installer | bash
      args:
        creates: /home/{{ app_user }}/.rbenv/bin/rbenv
      when: not rbenv_dir.stat.exists
      tags: [ruby]

    - name: Configure rbenv in bashrc
      become_user: "{{ app_user }}"
      blockinfile:
        path: /home/{{ app_user }}/.bashrc
        marker: "# {mark} RBENV MANAGED BLOCK"
        block: |
          export PATH="$HOME/.rbenv/bin:$PATH"
          eval "$(rbenv init - bash)"
      tags: [ruby]

    - name: Check current Ruby version
      become_user: "{{ app_user }}"
      shell: |
        export PATH="/home/{{ app_user }}/.rbenv/bin:$PATH"
        eval "$(rbenv init -)"
        rbenv versions --bare | grep -q "^{{ ruby_version }}$" && echo "installed" || echo "missing"
      register: ruby_check
      changed_when: false
      tags: [ruby]

    - name: Install Ruby {{ ruby_version }}
      become_user: "{{ app_user }}"
      shell: |
        export PATH="/home/{{ app_user }}/.rbenv/bin:$PATH"
        eval "$(rbenv init -)"
        rbenv install {{ ruby_version }}
        rbenv global {{ ruby_version }}
      when: ruby_check.stdout == "missing"
      async: 900
      poll: 30
      tags: [ruby]

    - name: Set global Ruby version
      become_user: "{{ app_user }}"
      shell: |
        export PATH="/home/{{ app_user }}/.rbenv/bin:$PATH"
        eval "$(rbenv init -)"
        rbenv global {{ ruby_version }}
      changed_when: false
      tags: [ruby]

    - name: Install bundler
      become_user: "{{ app_user }}"
      shell: |
        export PATH="/home/{{ app_user }}/.rbenv/bin:$PATH"
        eval "$(rbenv init -)"
        gem install bundler
      args:
        creates: /home/{{ app_user }}/.rbenv/versions/{{ ruby_version }}/bin/bundler
      tags: [ruby]

    # =========================================================================
    # Node.js
    # =========================================================================
    - name: Add nodesource GPG key
      shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
      args:
        creates: /usr/share/keyrings/nodesource.gpg
      tags: [node]

    - name: Add nodesource apt repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
        state: present
        filename: nodesource
      tags: [node]

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes
      tags: [node]

    - name: Install Yarn globally
      npm:
        name: yarn
        global: yes
      tags: [node]

    # 3️⃣ Verify Yarn installation
    - name: Check Yarn version
      command: yarn --version
      register: yarn_version
      changed_when: false
      tags: [node]

    - name: Enable corepack
      shell: corepack enable
      args:
        creates: /usr/lib/node_modules/corepack
      tags: [node]

    # =========================================================================
    # WireGuard
    # =========================================================================
    - name: Install WireGuard packages
      apt:
        name:
          - wireguard
          - wireguard-tools
          - inotify-tools
        state: present
      tags: [wireguard]

    - name: Ensure /etc/wireguard directory
      file:
        path: /etc/wireguard
        state: directory
        owner: root
        group: "{{ wg_conf_group }}"
        mode: "0775"
      tags: [wireguard]

    - name: Ensure config directory exists
      file:
        path: "{{ app_dir }}/config"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"
      tags: [wireguard]

    - name: Remove config/wireguard directory if it exists
      file:
        path: "{{ app_dir }}/config/wireguard"
        state: absent
      tags: [wireguard]

    - name: Symlink config/wireguard to /etc/wireguard
      file:
        src: /etc/wireguard
        dest: "{{ app_dir }}/config/wireguard"
        state: link
        owner: "{{ app_user }}"
        group: "{{ wg_conf_group }}"
        force: yes
      tags: [wireguard]

    - name: Deploy WireGuard watcher script
      template:
        src: templates/wg-conf-watcher.sh.j2
        dest: /etc/wireguard/wg_conf_watcher.sh
        owner: root
        group: "{{ wg_conf_group }}"
        mode: "0755"
      notify: restart wireguard-watcher
      tags: [wireguard]

    - name: Deploy WireGuard watcher systemd unit
      template:
        src: templates/wireguard-watcher.service.j2
        dest: /etc/systemd/system/wireguard-watcher.service
      notify:
        - reload systemd
        - restart wireguard-watcher
      tags: [wireguard]

    - name: Enable and start WireGuard watcher
      systemd:
        name: wireguard-watcher
        enabled: yes
        state: started
        daemon_reload: yes
      tags: [wireguard]

    - name: Allow SSH through UFW
      ufw:
        rule: allow
        port: "22"
        proto: tcp
      tags: [wireguard]

    - name: Allow HTTP through UFW
      ufw:
        rule: allow
        port: "80"
        proto: tcp
      tags: [wireguard]

    - name: Allow HTTPS through UFW
      ufw:
        rule: allow
        port: "443"
        proto: tcp
      tags: [wireguard]

    - name: Allow WireGuard through UFW
      ufw:
        rule: allow
        port: "{{ wg_port }}"
        proto: udp
      tags: [wireguard]

    - name: Allow WireGuard peer-to-peer forwarding via UFW
      command: ufw route allow in on wg0 out on wg0
      register: ufw_route_result
      changed_when: "'Rule added' in ufw_route_result.stdout"
      tags: [wireguard]

    - name: Enable UFW with default deny
      ufw:
        state: enabled
        default: deny
        direction: incoming
      tags: [wireguard]

    # =========================================================================
    # Caddy (reverse proxy with automatic HTTPS)
    # =========================================================================
    - name: Install prerequisites for Caddy repo
      apt:
        name:
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
          - curl
        state: present
        update_cache: yes
      tags: [caddy]

    - name: Add Caddy GPG key
      shell: |
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
      tags: [caddy]

    - name: Add Caddy apt repository
      copy:
        dest: /etc/apt/sources.list.d/caddy-stable.list
        content: "deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main\n"
        mode: "0644"
      tags: [caddy]

    - name: Install Caddy
      apt:
        name: caddy
        state: present
        update_cache: yes
      tags: [caddy]

    - name: Create Caddy log directory
      file:
        path: /var/log/caddy
        state: directory
        owner: caddy
        group: caddy
        mode: "0755"
      tags: [caddy]

    - name: Create Caddy conf.d directory
      file:
        path: /etc/caddy/conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      tags: [caddy]

    - name: Deploy main Caddyfile
      copy:
        dest: /etc/caddy/Caddyfile
        content: |
          {
              log {
                  output file /var/log/caddy/caddy.log {
                      roll_size 100MiB
                      roll_keep 5
                      roll_keep_for 720h
                  }
                  level INFO
              }
          }

          import /etc/caddy/conf.d/*.caddy
        owner: root
        group: root
        mode: "0644"
      notify: reload caddy
      tags: [caddy]

    - name: Deploy Caddy site config
      copy:
        dest: "/etc/caddy/conf.d/{{ domain }}.caddy"
        content: |
          {{ domain }} {
              reverse_proxy localhost:{{ puma_port }}

              log {
                  output file /var/log/caddy/{{ domain }}.access.log {
                      roll_size 100MiB
                      roll_keep 5
                      roll_keep_for 720h
                  }
                  format json
                  level DEBUG
              }
          }
        owner: root
        group: root
        mode: "0644"
      notify: reload caddy
      tags: [caddy, update]

    - name: Deploy logrotate config for Caddy
      copy:
        dest: /etc/logrotate.d/caddy
        content: |
          /var/log/caddy/*.log {
              daily
              missingok
              rotate 14
              compress
              delaycompress
              notifempty
              create 0644 caddy caddy
              sharedscripts
              postrotate
                  systemctl reload caddy > /dev/null 2>&1 || true
              endscript
          }
        owner: root
        group: root
        mode: "0644"
      tags: [caddy]

    - name: Enable and start Caddy
      systemd:
        name: caddy
        enabled: yes
        state: started
        daemon_reload: yes
      tags: [caddy]

    # =========================================================================
    # Database setup (initial install only)
    # =========================================================================
    - name: Install MySQL packages
      apt:
        name:
          - mysql-server
          - mysql-client
          - python3-mysqldb
        state: present
      tags: [db]

    - name: Start and enable MySQL
      systemd:
        name: mysql
        enabled: yes
        state: started
      tags: [db]

    - name: Create MySQL database
      mysql_db:
        name: "{{ gate_database }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
      tags: [db]

    - name: Create MySQL user
      mysql_user:
        name: "{{ gate_database_user }}"
        password: "{{ gate_database_password }}"
        priv: "{{ gate_database }}.*:ALL"
        host: localhost
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
      tags: [db]

    # =========================================================================
    # Configuration (initial install only)
    # =========================================================================
    - name: Deploy puma systemd unit
      template:
        src: templates/gate-wireguard.service.j2
        dest: /etc/systemd/system/gate-wireguard.service
      notify: reload systemd
      tags: [config]

    - name: Deploy sudoers file
      template:
        src: templates/sudoers-gate.j2
        dest: /etc/sudoers.d/gate-wireguard
        mode: "0440"
        validate: "visudo -cf %s"
      tags: [config]

    - name: Deploy logrotate configuration
      copy:
        content: |
          {{ app_dir }}/log/*.log {
            daily
            missingok
            rotate 14
            compress
            delaycompress
            notifempty
            copytruncate
          }
        dest: /etc/logrotate.d/gate-wireguard
      tags: [config]

    - name: Enable and start Redis
      systemd:
        name: redis-server
        enabled: yes
        state: started
        daemon_reload: yes
      tags: [config]

    # =========================================================================
    # DEPLOYMENT (update tag) — follows strict ordering:
    #   1. Stop web (Puma)
    #   2. Backup rotation + mysqldump
    #   3. Clone/pull repo
    #   4. Post-clone (bundle, .env, assets, caches)
    #   5. Database migrate
    #   6. Start Puma — wait for port, verify stable
    #   7. Reload Caddy (only if config changed — handled by handler)
    # =========================================================================

    # ----- 1. Stop web — disable + kill + free port -------------------------
    - name: Stop Puma
      systemd:
        name: gate-wireguard
        state: stopped
      ignore_errors: yes
      tags: [update]

    - name: Kill orphan processes on port {{ puma_port }}
      shell: fuser -k {{ puma_port }}/tcp || true
      changed_when: false
      tags: [update]

    - name: Verify port {{ puma_port }} is free
      shell: "! ss -tlnp | grep -q ':{{ puma_port }} '"
      changed_when: false
      tags: [update]

    # ----- 2. Backup rotation + mysqldump -----------------------------------
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0750"
      tags: [update]

    - name: Dump MySQL database
      shell: >
        mysqldump --single-transaction
        {{ gate_database }}
        > {{ backup_dir }}/{{ gate_database }}_$(date +%Y%m%d_%H%M%S).sql
      args:
        executable: /bin/bash
      register: db_backup
      tags: [update]

    - name: Rotate old backups (keep {{ backup_keep }} most recent)
      shell: |
        cd {{ backup_dir }}
        ls -1t *.sql 2>/dev/null | tail -n +{{ backup_keep | int + 1 }} | xargs -r rm -f
      args:
        executable: /bin/bash
      changed_when: false
      tags: [update]

    # ----- 3. Clone / pull repo ---------------------------------------------
    - name: Generate SSH key for app user
      become_user: "{{ app_user }}"
      shell: ssh-keygen -t ed25519 -f /home/{{ app_user }}/.ssh/id_ed25519 -N "" -C "gate@{{ inventory_hostname }}"
      args:
        creates: /home/{{ app_user }}/.ssh/id_ed25519
      tags: [app, update]

    - name: Display deploy key for private repos
      become_user: "{{ app_user }}"
      shell: cat /home/{{ app_user }}/.ssh/id_ed25519.pub
      register: deploy_key
      changed_when: false
      tags: [app, update]

    - name: Show deploy key
      debug:
        msg: "Deploy key (add to repo if private): {{ deploy_key.stdout }}"
      tags: [app, update]

    - name: Add github.com to known_hosts
      become_user: "{{ app_user }}"
      known_hosts:
        name: github.com
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com 2>/dev/null') }}"
        path: /home/{{ app_user }}/.ssh/known_hosts
      tags: [app, update]

    - name: Check if repo already initialized
      stat:
        path: "{{ app_dir }}/.git"
      register: repo_stat

    - name: Initialize git repo in existing directory
      become_user: "{{ app_user }}"
      command: git init
      args:
        chdir: "{{ app_dir }}"
      when: not repo_stat.stat.exists

    - name: Add remote origin
      become_user: "{{ app_user }}"
      command: git remote add origin {{ git_repo }}
      args:
        chdir: "{{ app_dir }}"
      when: not repo_stat.stat.exists

    - name: Pull latest code
      become_user: "{{ app_user }}"
      git:
        repo: "{{ git_repo }}"
        dest: "{{ app_dir }}"
        version: "{{ git_branch }}"
        force: no
        accept_hostkey: yes
      tags: [app, update]

    # ----- 4. Post-clone — bundle, .env, assets, caches --------------------
    - name: Create application directories
      file:
        path: "{{ app_dir }}/{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
      loop:
        - log
        - tmp/pids
        - tmp/cache
        - tmp/sockets
        - storage
        - public/uploads
      tags: [app, update]

    - name: Bundle install
      become_user: "{{ app_user }}"
      shell: |
        export PATH="/home/{{ app_user }}/.rbenv/bin:$PATH"
        eval "$(rbenv init -)"
        bundle config set --local deployment true
        bundle config set --local without 'development test'
        bundle install
      args:
        chdir: "{{ app_dir }}"
      register: bundle_result
      changed_when: "'Installing' in bundle_result.stdout"
      tags: [app, update]

    - name: Yarn install
      become_user: "{{ app_user }}"
      shell: yarn install
      args:
        chdir: "{{ app_dir }}"
      register: yarn_result
      changed_when: "'YN0000' in yarn_result.stdout"
      tags: [app, update]

    - name: Deploy .env file
      template:
        src: templates/env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
      tags: [config, update]

    - name: Precompile assets
      become_user: "{{ app_user }}"
      shell: |
        export PATH="/home/{{ app_user }}/.rbenv/bin:$PATH"
        eval "$(rbenv init -)"
        SECRET_KEY_BASE_DUMMY=1 RAILS_ENV=production bundle exec rails assets:precompile
      args:
        chdir: "{{ app_dir }}"
      tags: [app, update]

    - name: Clear Rails cache
      become_user: "{{ app_user }}"
      shell: |
        export PATH="/home/{{ app_user }}/.rbenv/bin:$PATH"
        eval "$(rbenv init -)"
        RAILS_ENV=production bundle exec rails tmp:clear
      args:
        chdir: "{{ app_dir }}"
      changed_when: false
      tags: [update]

    # ----- 5. Database — ensure DB exists + migrate -------------------------
    - name: Run database migrations
      become_user: "{{ app_user }}"
      shell: |
        export PATH="/home/{{ app_user }}/.rbenv/bin:$PATH"
        eval "$(rbenv init -)"
        RAILS_ENV=production bundle exec rails db:prepare
      args:
        chdir: "{{ app_dir }}"
      register: db_migrate
      changed_when: "'Migrating' in db_migrate.stdout or 'Created database' in db_migrate.stdout"
      tags: [db, update]

    # ----- 6. Start Puma — wait for port, verify stable ---------------------
    - name: Reload systemd units
      systemd:
        daemon_reload: yes
      tags: [update]

    - name: Start Puma
      systemd:
        name: gate-wireguard
        enabled: yes
        state: started
      tags: [update]

    - name: Wait for Puma to listen on port {{ puma_port }}
      wait_for:
        port: "{{ puma_port }}"
        host: 127.0.0.1
        delay: 2
        timeout: 30
      tags: [update]

    - name: Verify Puma is stable (still running after 5s)
      shell: sleep 5 && systemctl is-active gate-wireguard
      register: puma_stable
      changed_when: false
      failed_when: puma_stable.stdout != "active"
      tags: [update]

    # ----- 7. Reload Caddy (only if config changed — via handler) -----------
    # The "Deploy Caddy site config" task above (tagged [caddy, update]) uses
    # notify: reload caddy — so Caddy only reloads when the config file
    # actually changes. Handlers fire at end of play, after Puma is up.
