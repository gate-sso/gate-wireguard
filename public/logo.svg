<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc66;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer hexagon (shield shape) -->
  <path d="M256 32 L448 144 L448 368 L256 480 L64 368 L64 144 Z"
        fill="none" stroke="url(#glow)" stroke-width="16" stroke-linejoin="round"/>
  <!-- Inner keyhole circle -->
  <circle cx="256" cy="220" r="64" fill="none" stroke="url(#glow)" stroke-width="12"/>
  <!-- Keyhole slot -->
  <path d="M232 268 L256 380 L280 268" fill="none" stroke="url(#glow)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Network nodes -->
  <circle cx="256" cy="220" r="6" fill="#00ff88"/>
  <circle cx="140" cy="180" r="5" fill="#00ff88" opacity="0.6"/>
  <circle cx="372" cy="180" r="5" fill="#00ff88" opacity="0.6"/>
  <circle cx="140" cy="300" r="5" fill="#00ff88" opacity="0.6"/>
  <circle cx="372" cy="300" r="5" fill="#00ff88" opacity="0.6"/>
  <!-- Network lines to nodes -->
  <line x1="256" y1="220" x2="140" y2="180" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="220" x2="372" y2="180" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="220" x2="140" y2="300" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="220" x2="372" y2="300" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
</svg>
