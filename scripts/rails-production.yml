---
- name: Deploy Gate-WireGuard Rails application
  hosts: all
  become: yes
  vars:
    app_name: "gate-wireguard"
    # deploy_user, puma_port, env_file are passed via --extra-vars
    home_path: "/home/{{ deploy_user }}"
    app_path: "{{ home_path }}/{{ app_name }}"
    gem_home: "{{ home_path }}/.ruby"
    wg_conf_group: wg_conf
    ruby_env:
      GEM_HOME: "{{ gem_home }}"
      PATH: "{{ gem_home }}/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

  tasks:
    # ----------------------------------------------------------------
    # 1. Backup and clone application
    # ----------------------------------------------------------------
    - name: Backup and rotate old releases
      ansible.builtin.shell: |
        if [ -d "{{ app_path }}" ] && [ "$(ls -A {{ app_path }})" ]; then
          for i in 4 3 2 1; do
            src="{{ app_path }}.bak.${i}"
            dst="{{ app_path }}.bak.$((i+1))"
            [ -d "$src" ] && mv "$src" "$dst"
          done
          rm -rf "{{ app_path }}.bak.5" "{{ app_path }}.bak.1"
          mv "{{ app_path }}" "{{ app_path }}.bak.1"
        else
          rm -rf "{{ app_path }}"
        fi
      changed_when: true

    - name: Clone gate-wireguard repository
      ansible.builtin.git:
        repo: "https://github.com/gate-sso/gate-wireguard.git"
        dest: "{{ app_path }}"
        version: main
        accept_hostkey: yes
      become_user: "{{ deploy_user }}"

    - name: Create required directories and set ownership
      ansible.builtin.shell: |
        mkdir -p "{{ app_path }}/tmp/pids" "{{ app_path }}/tmp/cache" "{{ app_path }}/tmp/sockets" "{{ app_path }}/log"
        chown -R {{ deploy_user }}:{{ deploy_user }} "{{ app_path }}"
      changed_when: true

    # ----------------------------------------------------------------
    # 2. Deploy .env file and generate SECRET_KEY_BASE
    # ----------------------------------------------------------------
    - name: Copy .env file to app directory
      ansible.builtin.copy:
        src: "{{ env_file }}"
        dest: "{{ app_path }}/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"

    - name: Check if persistent SECRET_KEY_BASE file exists
      ansible.builtin.stat:
        path: "{{ home_path }}/.secret_key_base"
      register: secret_key_file

    - name: Generate persistent SECRET_KEY_BASE file
      ansible.builtin.shell: |
        openssl rand -hex 64 > {{ home_path }}/.secret_key_base
        chmod 0600 {{ home_path }}/.secret_key_base
        chown {{ deploy_user }}:{{ deploy_user }} {{ home_path }}/.secret_key_base
      when: not secret_key_file.stat.exists
      no_log: true

    - name: Read SECRET_KEY_BASE from persistent file
      ansible.builtin.command: cat {{ home_path }}/.secret_key_base
      register: secret_key_base_raw
      changed_when: false
      no_log: true

    - name: Set SECRET_KEY_BASE fact
      ansible.builtin.set_fact:
        secret_key_base: "{{ secret_key_base_raw.stdout | trim }}"
      no_log: true

    - name: Append SECRET_KEY_BASE to .env file
      ansible.builtin.lineinfile:
        path: "{{ app_path }}/.env"
        regexp: '^SECRET_KEY_BASE='
        line: "SECRET_KEY_BASE={{ secret_key_base }}"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"
      no_log: true

    # ----------------------------------------------------------------
    # 3. Install gems and Yarn dependencies
    # ----------------------------------------------------------------
    - name: Install Bundler gem
      community.general.gem:
        name: bundler
        state: present
      environment: "{{ ruby_env }}"

    - name: Configure bundle path and install gems
      ansible.builtin.shell: |
        bundle config set --local path {{ home_path }}/.bundledgems
        bundle install --jobs 4 --retry 3
      args:
        chdir: "{{ app_path }}"
        executable: /bin/bash
      become_user: "{{ deploy_user }}"
      environment: "{{ ruby_env }}"

    - name: Install Yarn dependencies
      ansible.builtin.shell: |
        export NVM_DIR="{{ home_path }}/.nvm"
        . "$NVM_DIR/nvm.sh"
        yarn install
      args:
        chdir: "{{ app_path }}"
        executable: /bin/bash
      become_user: "{{ deploy_user }}"

    # ----------------------------------------------------------------
    # 4. Create MySQL database and user
    # ----------------------------------------------------------------
    - name: Read database credentials from .env
      ansible.builtin.shell: |
        grep '^GATE_DATABASE=' {{ app_path }}/.env | cut -d= -f2
        grep '^GATE_DATABASE_USER=' {{ app_path }}/.env | cut -d= -f2
        grep '^GATE_DATABASE_PASSWORD=' {{ app_path }}/.env | cut -d= -f2
      register: db_creds_raw
      changed_when: false
      no_log: true

    - name: Set database facts
      ansible.builtin.set_fact:
        db_name: "{{ db_creds_raw.stdout_lines[0] | trim }}"
        db_user: "{{ db_creds_raw.stdout_lines[1] | trim }}"
        db_pass: "{{ db_creds_raw.stdout_lines[2] | trim }}"
      no_log: true

    - name: Create MySQL database
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create MySQL user
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_pass }}"
        priv: "{{ db_name }}.*:ALL"
        host: localhost
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
      no_log: true

    # ----------------------------------------------------------------
    # 5. Database migrations and asset precompilation
    # ----------------------------------------------------------------
    - name: Run database migrations
      ansible.builtin.command:
        cmd: bundle exec rails db:migrate
        chdir: "{{ app_path }}"
      become_user: "{{ deploy_user }}"
      environment:
        RAILS_ENV: production
        SECRET_KEY_BASE: "{{ secret_key_base }}"
        GEM_HOME: "{{ gem_home }}"
        PATH: "{{ gem_home }}/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

    - name: Precompile assets
      ansible.builtin.shell: |
        export NVM_DIR="{{ home_path }}/.nvm"
        . "$NVM_DIR/nvm.sh"
        bundle exec rails assets:precompile
      args:
        chdir: "{{ app_path }}"
        executable: /bin/bash
      become_user: "{{ deploy_user }}"
      environment:
        RAILS_ENV: production
        SECRET_KEY_BASE: "{{ secret_key_base }}"
        GEM_HOME: "{{ gem_home }}"
        PATH: "{{ gem_home }}/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] }}"

    # ----------------------------------------------------------------
    # 6. Symlink WireGuard config
    # ----------------------------------------------------------------
    - name: Symlink config/wireguard to /etc/wireguard
      ansible.builtin.shell: |
        rm -rf "{{ app_path }}/config/wireguard"
        ln -sf /etc/wireguard "{{ app_path }}/config/wireguard"
        chown -h {{ deploy_user }}:{{ wg_conf_group }} "{{ app_path }}/config/wireguard"
      changed_when: true

    # ----------------------------------------------------------------
    # 7. Create systemd service and restart Puma
    # ----------------------------------------------------------------
    - name: Create systemd service for Puma
      ansible.builtin.copy:
        dest: /etc/systemd/system/gate_wireguard.service
        content: |
          [Unit]
          Description=Gate-WireGuard (Puma)
          After=network.target mysql.service redis-server.service
          Requires=mysql.service redis-server.service

          [Service]
          Type=simple
          User={{ deploy_user }}
          Group={{ deploy_user }}
          WorkingDirectory={{ app_path }}
          EnvironmentFile={{ app_path }}/.env
          Environment=RAILS_ENV=production
          Environment=GEM_HOME={{ gem_home }}
          Environment=PATH={{ gem_home }}/bin:/usr/local/bin:/usr/bin:/bin
          ExecStart=/usr/local/bin/bundle exec puma -C {{ app_path }}/config/puma.rb
          Restart=always
          RestartSec=5
          StandardOutput=append:{{ app_path }}/log/puma.log
          StandardError=append:{{ app_path }}/log/puma.log
          SyslogIdentifier=gate-wireguard

          [Install]
          WantedBy=multi-user.target

    - name: Enable and restart Puma
      ansible.builtin.systemd:
        name: gate_wireguard
        enabled: yes
        state: restarted
        daemon_reload: yes
